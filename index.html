<!DOCTYPE html>
<html>
<head>
  <title>AI Interview</title>
</head>
<body>

<h2>AI Interview Session</h2>

<label>Name:</label><br>
<input type="text" id="name" readonly><br><br>

<label>Role:</label><br>
<input type="text" id="role" readonly><br><br>

<button onclick="startInterview()">Start Interview</button>

<br><br>

<video id="video" width="400" autoplay></video>

<script>
function getQueryParams() {
    const params = new URLSearchParams(window.location.search);
    return {
        name: params.get("name"),
        role: params.get("role")
    };
}

// Auto-fill values from URL
window.onload = function () {
    const { name, role } = getQueryParams();

    if (name) document.getElementById("name").value = name;
    if (role) document.getElementById("role").value = role;
};

async function startInterview() {
    const name = document.getElementById("name").value;
    const role = document.getElementById("role").value;

    if (!name || !role) {
        alert("Missing candidate details");
        return;
    }

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById("video").srcObject = stream;

    alert("Interview Started for " + name + " (" + role + ")");
}
</script>

</body>
</html>
